                el("td",{style:{padding:"7px 10px",fontSize:11,fontWeight:700,color:G.txt,borderBottom:`1px solid ${G.bdrS}`}},n),
                el("td",{style:{padding:"7px 10px",fontSize:11,fontWeight:700,color:ok?G.pos:G.neg,borderBottom:`1px solid ${G.bdrS}`}},v),
                el("td",{style:{padding:"7px 10px",fontSize:10,color:G.txtF,borderBottom:`1px solid ${G.bdrS}`}},t),
                el("td",{style:{padding:"7px 10px",borderBottom:`1px solid ${G.bdrS}`}},el(Bdg,{t:ok?"✅ OK":"⚠️ Review",c:ok?G.pos:G.wrn,sm:true}))
              ))
            )
          )
        )
      )
    )
  );

  // ══ REPORTS ══════════════════════════════════════════════
  const PReports=()=>el("div",{style:{animation:"fadeIn .4s"}},
    el("div",{style:{background:"white",border:`1px solid ${G.bdr}`,borderRadius:14,padding:"16px 18px",boxShadow:G.shd,marginBottom:14}},
      el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}},
        el("div",{style:{fontSize:13,fontWeight:700,color:G.goldD,display:"flex",alignItems:"center",gap:8}},
          "✦ "+(ar?"التقرير المالي الشامل":"Full Financial Report"),
          el(Bdg,{t:mode==="connected"?(ar?"بيانات حقيقية":"Live"):(ar?"تجريبي":"Demo"),c:mode==="connected"?G.pos:G.wrn})
        ),
        el(ExpBtn,{isAr:ar,onP:()=>window.print(),onE:doExcel,onPdf:()=>window.print()})
      ),
      el("div",{style:{overflowX:"auto"}},
        el("table",{style:{width:"100%",borderCollapse:"collapse",minWidth:460}},
          el("thead",null,el("tr",null,[ar?"المؤشر":"KPI",ar?"القيمة":"Value",ar?"المعيار":"Benchmark",ar?"الحالة":"Status",ar?"الإجراء":"Action"].map(h=>el("th",{key:h,style:{textAlign:ar?"right":"left",padding:"8px 12px",fontSize:11,color:G.txtF,borderBottom:`2px solid ${G.bdr}`,fontWeight:700}},h)))),
          el("tbody",null,
            [
              [ar?"إجمالي الإيرادات":"Total Revenue",`${fmt(K.totRev*R)} ${SY}`,"—",true,"—"],
              [ar?"الإيراد التشغيلي":"Op. Revenue",`${fmt(K.rev*R)} ${SY}`,"—",true,"—"],
              [ar?"إجمالي الربح":"Gross Profit",`${fmt(K.gp*R)} ${SY}`,`≥${targets.grossMargin}%`,K.gm>=targets.grossMargin,K.gm>=targets.grossMargin?(ar?"ممتاز":"Excellent"):(ar?"راجع التكاليف":"Review costs")],
              [ar?"هامش إجمالي":"Gross Margin",`${fmtD(K.gm)}%`,`≥${targets.grossMargin}%`,K.gm>=targets.grossMargin,"—"],
              ["EBIT",`${fmt(K.ebit*R)} ${SY}`,"≥0",K.ebit>=0,K.ebit>=0?(ar?"إيجابي":"Positive"):(ar?"راجع فوراً":"Urgent")],
              [ar?"صافي الربح":"Net Profit",`${fmt(K.np*R)} ${SY}`,"≥0",K.np>=0,"—"],
              [ar?"هامش صافي":"Net Margin",`${fmtD(K.nm)}%`,`≥${targets.netMargin}%`,K.nm>=targets.netMargin,"—"],
              ["DSO",`${fmtD(K.dso,0)}d`,`≤${targets.dso}d`,K.dso<=targets.dso,K.dso<=targets.dso?(ar?"ضمن الهدف":"On target"):(ar?"تسريع التحصيل":"Accelerate")],
              ["DPO",`${fmtD(K.dpo,0)}d`,"≥30d",K.dpo>=30,"—"],
              ["CCC",`${fmtD(K.ccc,0)}d`,"<30d",K.ccc<30,"—"],
              [ar?"نسبة التحصيل":"Collection",`${fmtD(K.coll)}%`,`≥${targets.collectionRate}%`,K.coll>=targets.collectionRate,"—"],
              ["Cash Runway",`${fmtD(K.runway,1)}mo`,`≥${targets.cashRunway}mo`,K.runway>=targets.cashRunway,K.runway>=targets.cashRunway?(ar?"مستقر":"Stable"):(ar?"مراجعة السيولة":"Review liquidity")],
              [ar?"الذمم المدينة":"AR",`${fmt(K.arBal*R)} ${SY}`,"—",true,"—"],
              [ar?"الذمم الدائنة":"AP",`${fmt(K.apBal*R)} ${SY}`,"—",true,"—"],
              [ar?"الخزينة والبنوك":"Cash & Banks",`${fmt(K.cash*R)} ${SY}`,"≥0",K.cash>=0,"—"],
            ].map(([n,v,b,ok,action],i)=>el("tr",{key:i,style:{background:i%2===0?G.sur:"white"}},
              el("td",{style:{padding:"8px 12px",fontSize:11,fontWeight:700,color:G.txt,borderBottom:`1px solid ${G.bdrS}`}},n),
              el("td",{style:{padding:"8px 12px",fontSize:11,fontWeight:700,color:G.gold,borderBottom:`1px solid ${G.bdrS}`}},v),
              el("td",{style:{padding:"8px 12px",fontSize:10,color:G.txtF,borderBottom:`1px solid ${G.bdrS}`}},b),
              el("td",{style:{padding:"8px 12px",borderBottom:`1px solid ${G.bdrS}`}},el(Bdg,{t:ok?"✅ OK":"⚠️ Review",c:ok?G.pos:G.wrn,sm:true})),
              el("td",{style:{padding:"8px 12px",fontSize:10,color:G.txtD,borderBottom:`1px solid ${G.bdrS}`}},action)
            ))
          )
        )
      )
    ),
    fetchLog.length>0&&el("div",{style:{background:"white",border:`1px solid ${G.bdr}`,borderRadius:14,padding:"14px 16px",boxShadow:G.shd}},
      el("div",{style:{fontSize:12,fontWeight:700,color:G.goldD,marginBottom:10}},"📡 "+(ar?"سجل جلب البيانات":"Data Fetch Log")),
      el("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},fetchLog.map((l,i)=>el(Bdg,{key:i,t:`${l.ok?"✅":"❌"} ${l.label}: ${l.count}`,c:l.ok?G.pos:G.neg})))
    )
  );

  // ══ SETTINGS ═════════════════════════════════════════════
  const PSettings=()=>el("div",{style:{animation:"fadeIn .4s"}},
    el("div",{style:{background:"white",border:`1px solid ${G.bdr}`,borderRadius:14,padding:"18px 20px",boxShadow:G.shd,marginBottom:14}},
      el("div",{style:{fontSize:14,fontWeight:700,color:G.goldD,marginBottom:16}},ar?"⚙️ حالة الاتصال بدفترة":"⚙️ Daftra Connection"),
      el("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:16,padding:"14px 16px",borderRadius:10,background:mode==="connected"?G.pos+"10":G.sur,border:`1px solid ${mode==="connected"?G.pos+"30":G.bdrS}`}},
        el("div",{style:{width:14,height:14,borderRadius:"50%",background:mode==="connected"?G.pos:G.wrn,flexShrink:0}}),
        el("div",{style:{flex:1}},
          el("div",{style:{fontSize:13,fontWeight:700,color:mode==="connected"?G.pos:G.txtD}},mode==="connected"?(ar?"✅ متصل بدفترة بنجاح":"✅ Connected to Daftra"):(ar?"🔷 غير متصل":"🔷 Not connected")),
          mode==="connected"&&el("div",{style:{fontSize:10,color:G.txtF,marginTop:3}},`${subdomain||"—"} | ${ar?"آخر تحديث:":"Last sync:"} ${lastSync?.toLocaleTimeString(ar?"ar-EG":"en")||"—"}`)
        ),
        mode==="connected"&&el("button",{onClick:disconnect,style:{padding:"6px 14px",borderRadius:8,border:`1px solid ${G.neg}40`,background:G.neg+"10",color:G.neg,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}},ar?"⏏ قطع":"⏏ Disconnect")
      ),
      mode!=="connected"&&el("div",{style:{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:12}},
        el("div",{style:{padding:"16px",borderRadius:10,border:`2px solid ${G.gold}`,background:G.goldL,cursor:"pointer"},onClick:()=>setShowApi(true)},
          el("div",{style:{fontSize:13,fontWeight:800,color:G.goldD,marginBottom:4}},"🔑 API Key"),
          el("div",{style:{fontSize:11,color:G.txtD,lineHeight:1.6,marginBottom:10}},ar?"إدخال API Key من إعدادات دفترة — يعمل فوراً":"Enter API Key — works immediately"),
          el("button",{onClick:()=>setShowApi(true),style:{padding:"7px 16px",borderRadius:7,border:"none",background:G.gold,color:"white",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}},ar?"اتصال":"Connect")
        ),
        el("div",{style:{padding:"16px",borderRadius:10,border:`1px solid ${G.bdr}`,background:G.sur},onClick:loginOAuth},
          el("div",{style:{fontSize:13,fontWeight:800,color:G.goldD,marginBottom:4}},"🔗 OAuth 2.0"),
          el("div",{style:{fontSize:11,color:G.txtD,lineHeight:1.6,marginBottom:4}},ar?"تسجيل دخول رسمي بدفترة":"Official Daftra login"),
          el("div",{style:{fontSize:9,color:G.wrn,marginBottom:10}},ar?"⚠ التطبيق قيد المراجعة":"⚠ App under review"),
          el("button",{onClick:loginOAuth,style:{padding:"7px 16px",borderRadius:7,border:`1px solid ${G.gold}`,background:"white",color:G.goldD,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}},ar?"تسجيل دخول":"OAuth Login")
        )
      )
    ),
    el("div",{style:{background:"white",border:`1px solid ${G.bdr}`,borderRadius:14,padding:"18px 20px",boxShadow:G.shd,marginBottom:14}},
      el("div",{style:{fontSize:14,fontWeight:700,color:G.goldD,marginBottom:14}},ar?"🔄 التحديث التلقائي":"🔄 Auto Refresh"),
      el("div",{style:{display:"flex",gap:10,flexWrap:"wrap"}},
        [{v:0,l:ar?"يدوي":"Manual"},{v:5,l:"5m"},{v:15,l:"15m"},{v:30,l:"30m"},{v:60,l:"1h"}]
        .map(opt=>el("button",{key:opt.v,onClick:()=>setAutoMin(opt.v),style:{padding:"8px 16px",borderRadius:8,border:`1.5px solid ${autoMin===opt.v?G.gold:G.bdr}`,background:autoMin===opt.v?G.gold:"white",color:autoMin===opt.v?"white":G.txtD,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}},opt.l))
      ),
      el("div",{style:{fontSize:10,color:G.txtF,marginTop:8}},autoMin===0?(ar?"التحديث يدوي":"Manual only"):(ar?`يتحدث كل ${autoMin} دقيقة`:`Refreshes every ${autoMin} minutes`))
    ),
    el("div",{style:{background:"white",border:`1px solid ${G.bdr}`,borderRadius:14,padding:"18px 20px",boxShadow:G.shd,marginBottom:14}},
      el("div",{style:{fontSize:14,fontWeight:700,color:G.goldD,marginBottom:14}},ar?"🎯 الأهداف المالية":"🎯 Financial Targets"),
      el("div",{style:{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(2,1fr)",gap:14}},
        [{k:"grossMargin",l:ar?"هامش الربح الإجمالي":"Gross Margin",u:"%",min:0,max:80},
         {k:"netMargin",l:ar?"هامش الصافي":"Net Margin",u:"%",min:0,max:50},
         {k:"collectionRate",l:ar?"نسبة التحصيل":"Collection Rate",u:"%",min:0,max:100},
         {k:"dso",l:"DSO",u:ar?" يوم":" days",min:10,max:120},
         {k:"cashRunway",l:"Cash Runway",u:ar?" أشهر":" months",min:1,max:24}]
        .map(f=>el("div",{key:f.k},
          el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6}},
            el("label",{style:{fontSize:11,fontWeight:600,color:G.txt}},f.l),
            el("span",{style:{fontSize:13,fontWeight:800,color:G.gold}},`${targets[f.k]}${f.u}`)
          ),
          el("input",{type:"range",min:f.min,max:f.max,value:targets[f.k],onChange:e=>setTargets(p=>({...p,[f.k]:parseInt(e.target.value)})),style:{width:"100%",accentColor:G.gold}})
        ))
      )
    ),
    el("div",{style:{background:G.sur,border:`1px solid ${G.bdrS}`,borderRadius:14,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}},
      el(Logo,{size:32}),
      el("div",null,el("div",{style:{fontSize:11,fontWeight:700,color:G.goldD}},"CLink· CFO Dashboard v5.0"),el("div",{style:{fontSize:10,color:G.txtF}},"InvestorProHub | 2026")),
      el("div",{style:{textAlign:"center",padding:"8px 16px",background:"white",borderRadius:10,border:`1px solid ${G.bdr}`}},el("div",{style:{fontSize:10,color:G.txtF}},"Daftra API"),el("div",{style:{fontSize:10,fontWeight:700,color:G.gold,direction:"ltr"}},`${subdomain||"app"}.daftra.com`))
    )
  );

  // ══ RENDER ════════════════════════════════════════════════
  return el("div",{style:{minHeight:"100vh",background:G.bg,color:G.txt,fontFamily:"'Cairo',sans-serif",direction:dir}},
    mode==="loading"&&el(LoadOv),
    showApi&&el(ApiMod),
    !mob&&el(Sidebar),
    mob&&el(BotNav),
    el("main",{style:{[ar?"marginRight":"marginLeft"]:SW,minHeight:"100vh"}},
      el(ConnBar),el(Header),
      el("div",{style:{padding:mob?"12px 12px 80px":"16px 20px"}},
        page==="home"    &&el(PHome),
        page==="pl"      &&el(PPL),
        page==="revenue" &&el(PRevenue),
        page==="expenses"&&el(PExpenses),
        page==="liquidity"&&el(PLiq),
        page==="banks"   &&el(PBanks),
        page==="alerts"  &&el(PAlerts),
        page==="board"   &&el(PBoard),
        page==="reports" &&el(PReports),
        page==="settings"&&el(PSettings),
      ),
      !mob&&el("div",{className:"np",style:{padding:"8px 20px",borderTop:`1px solid ${G.bdrS}`,display:"flex",justifyContent:"space-between",fontSize:9,color:G.txtF}},
        el("span",null,`IFRS | ${ar?money.n:money.nE} | FY 2025/2026`),
        el("span",{style:{color:G.gold,fontWeight:700}},"CLink· CFO v5.0 | InvestorProHub 2026")
      )
    ),
    el(ToastEl)
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(el(App));
}); // end load event
</script>
</body>
</html>
