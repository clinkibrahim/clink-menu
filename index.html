<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CLink Menu | حاسبة تكلفة المطاعم</title>
  <style>* { margin:0; padding:0; box-sizing:border-box; } body { background:#FFFDF7; } @media print { .np { display:none!important; } }</style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useEffect } = React;

const useScreen = () => {
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1200);
  useEffect(() => { const fn = () => setW(window.innerWidth); window.addEventListener("resize", fn); return () => window.removeEventListener("resize", fn); }, []);
  return { isMobile: w < 640, isTablet: w >= 640 && w < 1024 };
};

// ── THEME ──────────────────────────────────────────────────
const C = {
  bg:"#FFFDF7", surface:"#FEF8ED", surface2:"#FDF3D8",
  border:"#E8D090", borderSoft:"#F2E4B0",
  gold:"#C8A84B", goldDark:"#9B7820", goldPale:"#C8A84B18", goldLight:"#FFF8E0",
  text:"#1E1408", textDim:"#5C4020", textFaint:"#9B7840",
  positive:"#1A6B1A", negative:"#B03020", warning:"#C07010",
  info:"#1A5C8A", white:"#FFFFFF",
  shadow:"0 2px 12px rgba(200,168,75,0.12)",
};

// ── CURRENCIES ─────────────────────────────────────────────
const CURRENCIES = [
  {code:"EGP",sym:"ج.م",  symEN:"EGP",name:"الجنيه المصري",   nameEN:"Egyptian Pound",  flag:"🇪🇬"},
  {code:"SAR",sym:"ر.س",  symEN:"SAR",name:"الريال السعودي",  nameEN:"Saudi Riyal",     flag:"🇸🇦"},
  {code:"AED",sym:"د.إ",  symEN:"AED",name:"الدرهم الإماراتي",nameEN:"UAE Dirham",      flag:"🇦🇪"},
  {code:"KWD",sym:"د.ك",  symEN:"KWD",name:"الدينار الكويتي", nameEN:"Kuwaiti Dinar",   flag:"🇰🇼"},
  {code:"BHD",sym:"د.ب",  symEN:"BHD",name:"الدينار البحريني",nameEN:"Bahraini Dinar",  flag:"🇧🇭"},
  {code:"QAR",sym:"ر.ق",  symEN:"QAR",name:"الريال القطري",   nameEN:"Qatari Riyal",    flag:"🇶🇦"},
  {code:"JOD",sym:"د.أ",  symEN:"JOD",name:"الدينار الأردني", nameEN:"Jordanian Dinar", flag:"🇯🇴"},
];

// ── DAFTRA API ─────────────────────────────────────────────
const REFRESH_KEY = "clink_menu_token";
const SUB_KEY     = "clink_menu_sub";

const DaftraAPI = {
  getToken()      { try { return sessionStorage.getItem(REFRESH_KEY); } catch(e) { return null; } },
  getSubdomain()  { try { return sessionStorage.getItem(SUB_KEY);     } catch(e) { return null; } },
  saveToken(token, sub) {
    try { sessionStorage.setItem(REFRESH_KEY, token); } catch(e) {}
    try { if (sub) sessionStorage.setItem(SUB_KEY, sub); } catch(e) {}
  },
  clearToken() {
    try { sessionStorage.removeItem(REFRESH_KEY); sessionStorage.removeItem(SUB_KEY); } catch(e) {}
  },
  async getProducts(token, sub) {
    const url = `/api/daftra?subdomain=${encodeURIComponent(sub)}&apikey=${encodeURIComponent(token)}&endpoint=${encodeURIComponent("products.json?limit=200")}`;
    const r = await fetch(url);
    if (!r.ok) {
      const e = await r.json().catch(function() { return {}; });
      throw new Error(e.message || "HTTP " + r.status);
    }
    const data = await r.json();
    if (!data.data) throw new Error(ar ? "لا توجد بيانات من دفترة" : "No data from Daftra");
    return data.data.map(function(item, i) { return {
      id: i + 1,
      name:     item.Product?.name || "منتج",
      nameEN:   item.Product?.name || "Product",
      price:    parseFloat(item.Product?.buy_price) || 0,
      unit:     "كجم", unitEN: "kg",
      category: item.Product?.ProductCategory?.[0]?.name || "عام",
      catEN:    item.Product?.ProductCategory?.[0]?.name || "General",
      stock:    parseFloat(item.Product?.stock_balance) || 0,
    }; });
  },
};

// ── DEMO DATA ──────────────────────────────────────────────
const DEMO_ING = [
  {id:1, name:"دجاج مشوي",   nameEN:"Grilled Chicken", unit:"كجم", unitEN:"kg",  price:85,  category:"بروتين",  catEN:"Protein",     stock:15},
  {id:2, name:"أرز بسمتي",   nameEN:"Basmati Rice",    unit:"كجم", unitEN:"kg",  price:22,  category:"حبوب",    catEN:"Grains",      stock:50},
  {id:3, name:"زيت زيتون",   nameEN:"Olive Oil",       unit:"لتر", unitEN:"ltr", price:95,  category:"زيوت",    catEN:"Oils",        stock:8},
  {id:4, name:"طماطم",       nameEN:"Tomatoes",        unit:"كجم", unitEN:"kg",  price:12,  category:"خضروات",  catEN:"Vegetables",  stock:20},
  {id:5, name:"بصل",         nameEN:"Onion",           unit:"كجم", unitEN:"kg",  price:8,   category:"خضروات",  catEN:"Vegetables",  stock:25},
  {id:6, name:"ثوم",         nameEN:"Garlic",          unit:"كجم", unitEN:"kg",  price:35,  category:"توابل",   catEN:"Spices",      stock:5},
  {id:7, name:"جبن موزاريلا",nameEN:"Mozzarella",      unit:"كجم", unitEN:"kg",  price:120, category:"ألبان",   catEN:"Dairy",       stock:10},
  {id:8, name:"عجينة بيتزا", nameEN:"Pizza Dough",     unit:"كجم", unitEN:"kg",  price:18,  category:"حبوب",    catEN:"Grains",      stock:30},
  {id:9, name:"لحم بقري",    nameEN:"Beef",            unit:"كجم", unitEN:"kg",  price:180, category:"بروتين",  catEN:"Protein",     stock:12},
  {id:10,name:"خس روماني",   nameEN:"Romaine Lettuce", unit:"كجم", unitEN:"kg",  price:20,  category:"خضروات",  catEN:"Vegetables",  stock:18},
];

const DEMO_RECIPES = [
  {id:1, name:"دجاج مشوي مع أرز",  nameEN:"Grilled Chicken & Rice", category:"أطباق رئيسية", catEN:"Main Dishes",  sellingPrice:95,  portions:1, ingredients:[{ingredientId:1,qty:0.25},{ingredientId:2,qty:0.15},{ingredientId:3,qty:0.02},{ingredientId:5,qty:0.05}]},
  {id:2, name:"بيتزا مارغريتا",     nameEN:"Margherita Pizza",       category:"بيتزا",        catEN:"Pizza",        sellingPrice:85,  portions:1, ingredients:[{ingredientId:8,qty:0.3},{ingredientId:7,qty:0.15},{ingredientId:4,qty:0.2},{ingredientId:3,qty:0.02}]},
  {id:3, name:"برجر لحم بقري",      nameEN:"Beef Burger",            category:"برجر",         catEN:"Burger",       sellingPrice:120, portions:1, ingredients:[{ingredientId:9,qty:0.2},{ingredientId:4,qty:0.05},{ingredientId:5,qty:0.03},{ingredientId:6,qty:0.01}]},
];

const PAGES = {SETUP:"setup", DASHBOARD:"dashboard", INGREDIENTS:"ingredients", RECIPES:"recipes", REPORTS:"reports", DEBUG:"debug"};

const getColor = pct => pct <= 28 ? C.positive : pct <= 35 ? C.warning : C.negative;
const getLabel = (pct, ar) => pct <= 28 ? (ar?"ممتاز":"Excellent") : pct <= 35 ? (ar?"مقبول":"Acceptable") : (ar?"مرتفع":"High");

const fmt = n => new Intl.NumberFormat("ar-EG").format(Math.round(n * 100) / 100);

function App() {
  const { isMobile, isTablet } = useScreen();
  const [page, setPage]       = useState(PAGES.SETUP);
  const [lang, setLang]       = useState("AR");
  const [currency, setCurrency] = useState(CURRENCIES[0]);
  const [showCurr, setShowCurr] = useState(false);
  const [connection, setConnection] = useState({subdomain:"", apiKey:"", status:"disconnected", token:""});
  const [authLoading, setAuthLoading] = useState(false);
  const [ingredients, setIngredients] = useState(DEMO_ING);
  const [recipes, setRecipes]         = useState(DEMO_RECIPES);
  const [alert, setAlert]             = useState(null);
  const [showIngForm, setShowIngForm] = useState(false);
  const [showRecipeForm, setShowRecipeForm] = useState(false);
  const [editingRecipe, setEditingRecipe]   = useState(null);
  const [newIng, setNewIng]   = useState({name:"", nameEN:"", unit:"كجم", unitEN:"kg", price:"", category:"خضروات", catEN:"Vegetables"});
  const [newRecipe, setNewRecipe] = useState({name:"", nameEN:"", category:"أطباق رئيسية", catEN:"Main Dishes", sellingPrice:"", portions:1, ingredients:[]});
  const [recipeIngRow, setRecipeIngRow] = useState({ingredientId:"", qty:""});

  // ── DEBUG STATE ───────────────────────────────────────────
  const [debugLogs, setDebugLogs]         = useState([]);
  const [debugLoading, setDebugLoading]   = useState({});
  const [debugRaw, setDebugRaw]           = useState({});
  const [debugExpanded, setDebugExpanded] = useState({});
  const [customEp, setCustomEp]           = useState("products.json?limit=5");
  const [customResult, setCustomResult]   = useState(null);
  const [customLoading, setCustomLoading] = useState(false);

  const ar  = lang === "AR";
  const dir = ar ? "rtl" : "ltr";
  const SY  = ar ? currency.sym : currency.symEN;
  const sidebarW = isMobile ? 0 : isTablet ? 70 : 230;

  const toast = (msg, type="success") => { setAlert({msg, type}); setTimeout(() => setAlert(null), 3000); };

  // ── EXPORT FUNCTIONS ──────────────────────────────────────
  const doPrint = () => window.print();

  const doExcel = () => {
    const header = ar
      ? ["الوصفة","التصنيف","تكلفة الطبق","سعر البيع","هامش الربح","نسبة التكلفة %","الحالة"]
      : ["Recipe","Category","Cost","Selling Price","Profit","Food Cost %","Status"];
    const rows = enriched.map(r => [
      ar ? r.name : (r.nameEN || r.name),
      ar ? r.category : (r.catEN || r.category),
      r.cost.toFixed(2),
      r.sellingPrice,
      r.profit.toFixed(2),
      r.pct.toFixed(1)+"%",
      getLabel(r.pct, ar),
    ]);
    const csv = [header, ...rows].map(row => row.join(",")).join("\n");
    const blob = new Blob(["\uFEFF" + csv], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "CLink_Menu_Report.csv";
    a.click();
    URL.revokeObjectURL(a.href);
  };

  // ── CONNECT DAFTRA (API Key فقط) ─────────────────────────
  useEffect(() => {
    // استعادة جلسة محفوظة عند تحميل الصفحة
    const savedToken = DaftraAPI.getToken();
    const savedSub   = DaftraAPI.getSubdomain();
    if (savedToken && savedSub) {
      setConnection(c => ({...c, status:"connecting", token:savedToken, subdomain:savedSub, apiKey:savedToken}));
      setAuthLoading(true);
      DaftraAPI.getProducts(savedToken, savedSub)
        .then(function(products) {
          if (products.length > 0) {
            setIngredients(products);
            setRecipes([]);
            setConnection(c => ({...c, status:"connected"}));
            setPage(PAGES.DASHBOARD);
          } else {
            setConnection(c => ({...c, status:"connected"}));
            setPage(PAGES.DASHBOARD);
          }
        })
        .catch(function() {
          // الجلسة منتهية — يعود لصفحة الإعدادات
          DaftraAPI.clearToken();
          setConnection({subdomain:"", apiKey:"", status:"disconnected", token:""});
        })
        .finally(function() { setAuthLoading(false); });
    }
  }, []);

  // ── اتصال بـ API Key ──────────────────────────────────
  const connectDaftra = async () => {
    const sub = connection.subdomain.trim().replace(/\.daftra\.com.*$/, "");
    const key = connection.apiKey.trim();
    if (!sub || !key) {
      return toast(ar ? "أدخل النطاق ومفتاح API" : "Enter subdomain and API key", "error");
    }
    setConnection(c => ({...c, status:"connecting"}));
    setAuthLoading(true);
    try {
      const products = await DaftraAPI.getProducts(key, sub);
      // حفظ فوري في sessionStorage
      DaftraAPI.saveToken(key, sub);
      // مسح بيانات الديمو
      setRecipes([]);
      if (products.length > 0) {
        setIngredients(products);
        toast(ar ? `✅ تم الاتصال! جُلب ${products.length} منتج من دفترة` : `✅ Connected! ${products.length} products loaded`);
      } else {
        setIngredients([]);
        toast(ar ? "✅ متصل بدفترة — لا توجد منتجات بعد" : "✅ Connected — No products yet", "warn");
      }
      setConnection(c => ({...c, status:"connected", token:key, subdomain:sub}));
      setPage(PAGES.DASHBOARD);
    } catch(err) {
      const msg = err.message || "";
      if (msg.includes("401") || msg.includes("Unauthorized")) {
        toast(ar ? "❌ مفتاح API غير صحيح" : "❌ Invalid API Key", "error");
      } else if (msg.includes("404") || msg.includes("not found")) {
        toast(ar ? "❌ النطاق غير موجود في دفترة" : "❌ Subdomain not found", "error");
      } else {
        toast(ar ? `❌ تعذر الاتصال: ${msg}` : `❌ Connection failed: ${msg}`, "error");
      }
      setConnection(c => ({...c, status:"disconnected"}));
    } finally {
      setAuthLoading(false);
    }
  };

  // ── تحديث تلقائي كل 5 دقائق ─────────────────────────
  useEffect(() => {
    if (connection.status !== "connected" || !connection.token) return;
    const interval = setInterval(async () => {
      try {
        const products = await DaftraAPI.getProducts(
          connection.token,
          DaftraAPI.getSubdomain() || connection.subdomain
        );
        setIngredients(products);
      } catch {}
    }, 5 * 60 * 1000); // كل 5 دقائق
    return () => clearInterval(interval);
  }, [connection.status, connection.token]);

  // ── قطع الاتصال ──────────────────────────────────────
  const disconnect = () => {
    DaftraAPI.clearToken();
    setConnection({subdomain:"",apiKey:"",status:"disconnected",token:""});
    setIngredients(DEMO_ING);
    setRecipes(DEMO_RECIPES);
    toast(ar?"تم قطع الاتصال — تم استعادة البيانات التجريبية":"Disconnected — Demo data restored");
  };

  // ── CALCULATIONS ──────────────────────────────────────────
  const calcCost = recipe => recipe.ingredients.reduce((sum, ri) => {
    const ing = ingredients.find(i => i.id === ri.ingredientId);
    return sum + (ing ? ing.price * ri.qty : 0);
  }, 0);

  const enriched = useMemo(() => recipes.map(r => {
    const cost = calcCost(r);
    const pct  = r.sellingPrice > 0 ? (cost / r.sellingPrice) * 100 : 0;
    return {...r, cost, pct, profit: r.sellingPrice - cost};
  }), [recipes, ingredients]);

  const avgFC = useMemo(() => enriched.length ? enriched.reduce((s,r) => s+r.pct, 0) / enriched.length : 0, [enriched]);

  // ── STATUS COLORS ─────────────────────────────────────────
  const statusColors = {disconnected:C.textFaint, connecting:C.warning, connected:C.positive, demo:C.warning};
  const statusLabels = {
    disconnected: ar?"اضغط للاتصال":"Tap to Connect",
    connecting:   ar?"جاري...":"Connecting...",
    connected:    ar?"✅ متصل بدفترة":"✅ Connected to Daftra",
    demo:         ar?"وضع تجربة":"Demo Mode",
  };

  // ── NAV ───────────────────────────────────────────────────
  const navItems = [
    {id:PAGES.DASHBOARD,   icon:"◈", ar:"الرئيسية",   en:"Dashboard"},
    {id:PAGES.INGREDIENTS, icon:"⊞", ar:"المكوّنات",  en:"Ingredients"},
    {id:PAGES.RECIPES,     icon:"✦", ar:"الوصفات",    en:"Recipes"},
    {id:PAGES.REPORTS,     icon:"◎", ar:"التقارير",   en:"Reports"},
    {id:PAGES.SETUP,       icon:"⚙", ar:"الإعدادات",  en:"Settings"},
    {id:PAGES.DEBUG,       icon:"🔬", ar:"فحص API",   en:"API Debug"},
  ];

  // ── LOGO ─────────────────────────────────────────────────
  const Logo = () => (
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <svg width={30} height={30} viewBox="0 0 48 48">
        <rect width="48" height="48" rx="11" fill={C.gold}/>
        <path d="M 33.19 14.81 A 13 13 0 1 0 33.19 33.19" fill="none" stroke="white" strokeWidth="3.5" strokeLinecap="round"/>
        <circle cx="33.19" cy="14.81" r="3" fill="white"/>
        <circle cx="33.19" cy="33.19" r="3" fill="white"/>
        <line x1="36" y1="14.81" x2="43" y2="14.81" stroke="white" strokeWidth="1.5" strokeDasharray="2 2" opacity=".7"/>
        <line x1="36" y1="33.19" x2="43" y2="33.19" stroke="white" strokeWidth="1.5" strokeDasharray="2 2" opacity=".7"/>
        <circle cx="44.5" cy="24" r="2" fill="white" opacity=".85"/>
      </svg>
      <div>
        <div style={{fontSize:15,fontWeight:900,color:C.goldDark,lineHeight:1,fontFamily:"Georgia,serif"}}>CLink<span style={{color:C.gold}}>·</span></div>
        <div style={{fontSize:8,color:C.gold,letterSpacing:2,fontWeight:700,textTransform:"uppercase"}}>Menu App</div>
      </div>
    </div>
  );

  // ── SIDEBAR ───────────────────────────────────────────────
  const Sidebar = () => (
    <div style={{width:sidebarW,background:C.white,position:"fixed",top:0,[ar?"right":"left"]:0,bottom:0,zIndex:20,borderLeft:ar?`1px solid ${C.border}`:"none",borderRight:!ar?`1px solid ${C.border}`:"none",display:"flex",flexDirection:"column",boxShadow:C.shadow}}>
      <div style={{padding:isTablet?"12px 8px":"14px 14px",borderBottom:`1px solid ${C.borderSoft}`}}>
        {isTablet ? (
          <svg width={32} height={32} viewBox="0 0 48 48"><rect width="48" height="48" rx="11" fill={C.gold}/><path d="M 33.19 14.81 A 13 13 0 1 0 33.19 33.19" fill="none" stroke="white" strokeWidth="3.5" strokeLinecap="round"/><circle cx="33.19" cy="14.81" r="3" fill="white"/><circle cx="33.19" cy="33.19" r="3" fill="white"/></svg>
        ) : <Logo/>}
        {!isTablet && (
          <div style={{marginTop:10,padding:"6px 10px",background:C.goldLight,borderRadius:8,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:14}}>⬡</span>
            <div>
              <div style={{fontSize:10,fontWeight:700,color:C.goldDark}}>{ar?"حاسبة التكلفة":"Cost Calculator"}</div>
              <div style={{fontSize:9,color:C.textFaint}}>{currency.flag} {SY}</div>
            </div>
          </div>
        )}
      </div>
      <nav style={{flex:1,padding:isTablet?"8px 6px":"10px 8px"}}>
        {navItems.map(item => (
          <div key={item.id} onClick={() => setPage(item.id)} style={{display:"flex",alignItems:"center",gap:isTablet?0:8,justifyContent:isTablet?"center":"flex-start",padding:isTablet?"10px":"8px 10px",borderRadius:8,marginBottom:2,cursor:"pointer",background:page===item.id?C.goldPale:"transparent",border:`1px solid ${page===item.id?C.gold+"50":"transparent"}`,color:page===item.id?C.gold:C.textFaint,fontWeight:page===item.id?700:400,fontSize:12}}>
            <span style={{fontSize:14}}>{item.icon}</span>
            {!isTablet && <span>{ar?item.ar:item.en}</span>}
          </div>
        ))}
      </nav>
      <div style={{padding:"8px 12px",borderTop:`1px solid ${C.borderSoft}`}}>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:statusColors[connection.status]}}/>
          {!isTablet && <span style={{fontSize:10,color:statusColors[connection.status],fontWeight:600}}>{statusLabels[connection.status]}</span>}
        </div>
      </div>
    </div>
  );

  const BottomNav = () => (
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.white,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:20}}>
      {navItems.map(item => (
        <div key={item.id} onClick={() => setPage(item.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"6px 2px",cursor:"pointer",color:page===item.id?C.gold:C.textFaint,borderTop:`2px solid ${page===item.id?C.gold:"transparent"}`,background:page===item.id?C.goldPale:"transparent"}}>
          <span style={{fontSize:14,marginBottom:1}}>{item.icon}</span>
          <span style={{fontSize:8,fontWeight:page===item.id?700:400}}>{(ar?item.ar:item.en).split(" ")[0]}</span>
        </div>
      ))}
    </div>
  );

  // ── HEADER BAR (Language + Currency) ─────────────────────
  const HeaderBar = () => (
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"9px 14px",marginBottom:16,gap:8}} className="np">
      {/* Language */}
      <div style={{display:"flex",overflow:"hidden",borderRadius:8,border:`1px solid ${C.border}`}}>
        {["AR","EN"].map(l => (
          <button key={l} onClick={() => setLang(l)} style={{padding:"5px 14px",border:"none",background:lang===l?C.gold:"transparent",color:lang===l?"white":C.textFaint,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
        ))}
      </div>
      {/* Title */}
      <div style={{fontSize:isMobile?13:16,fontWeight:800,color:C.text}}>{ar?"⬡ حاسبة تكلفة المطاعم":"⬡ Restaurant Cost Calculator"}</div>
      {/* Currency */}
      <div style={{position:"relative"}}>
        <button onClick={() => setShowCurr(v => !v)} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",borderRadius:8,border:`2px solid ${C.gold}`,background:C.white,color:C.goldDark,fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit",boxShadow:`0 2px 8px ${C.gold}35`}}>
          <span style={{fontSize:18}}>{currency.flag}</span>
          <span>{SY}</span>
          <span style={{fontSize:8,color:C.textFaint}}>{showCurr?"▲":"▼"}</span>
        </button>

  ];

  const runDebugTest = async (ep, key) => {
    const token = connection.token || DaftraAPI.getToken();
    const sub   = DaftraAPI.getSubdomain() || connection.subdomain;
    if (!token) { addLog("error", "لا يوجد Token — اتصل بدفترة أولاً", "No token found in sessionStorage"); return; }
    setDebugLoading(l => ({...l, [key]:true}));
    setDebugRaw(r => ({...r, [key]:null}));
    const started = Date.now();
    try {
      const url = `/api/daftra?subdomain=${encodeURIComponent(sub)}&apikey=${encodeURIComponent(token)}&endpoint=${encodeURIComponent(ep)}`;
      addLog("info", `→ GET /api/daftra?endpoint=${ep}`, `subdomain: ${sub||"(فارغ)"} | token: ${token.slice(0,8)}...`);
      const res = await fetch(url);
      const ms  = Date.now() - started;
      const txt = await res.text();
      let parsed = null;
      try { parsed = JSON.parse(txt); } catch { parsed = {_raw: txt}; }
      setDebugRaw(r => ({...r, [key]:{status:res.status, ms, data:parsed}}));
      if (!res.ok) {
        addLog("error", `✗ ${key} → HTTP ${res.status} (${ms}ms)`, txt.slice(0,200));
      } else {
        const count = parsed?.data?.length ?? (parsed?.data ? 1 : "?");
        addLog("success", `✓ ${key} → ${res.status} OK (${ms}ms) — ${count} سجل`, "");
      }
    } catch(err) {
      addLog("error", `✗ ${key} → Network Error`, err.message);
      setDebugRaw(r => ({...r, [key]:{status:"ERR", ms:Date.now()-started, data:{error:err.message}}}));
    } finally {
      setDebugLoading(l => ({...l, [key]:false}));
    }
  };

        </div>

        {/* ── Session Info ────────────────────────────────────── */}
        <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 18px",marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:800,color:C.goldDark,marginBottom:12,letterSpacing:1}}>SESSION STORAGE</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:10}}>
            {[
              {key:"clink_menu_token", label:"Token", icon:"🔑"},
              {key:"clink_menu_sub",   label:"Subdomain", icon:"🌐"},
            ].map(item => {
              const val = (() => { try { return sessionStorage.getItem(item.key); } catch { return null; } })();
              return (
                <div key={item.key} style={{background:C.surface,borderRadius:8,padding:"10px 14px",border:`1px solid ${val?C.positive+"40":C.negative+"40"}`}}>
                  <div style={{fontSize:10,color:C.textFaint,marginBottom:3}}>{item.icon} {item.label}</div>
                  <div style={{fontFamily:"monospace",fontSize:11,color:val?C.text:C.negative,wordBreak:"break-all"}}>
                    {val ? (val.length > 40 ? val.slice(0,40)+"…" : val) : "❌ not found"}
                  </div>
                  {val && <div style={{fontSize:9,color:C.textFaint,marginTop:3}}>length: {val.length} chars</div>}
                </div>
              );
            })}
            <div style={{background:C.surface,borderRadius:8,padding:"10px 14px",border:`1px solid ${C.border}`}}>
              <div style={{fontSize:10,color:C.textFaint,marginBottom:3}}>📡 Connection Status</div>
              <div style={{fontFamily:"monospace",fontSize:11,color:C.text}}>{connection.status}</div>
              <div style={{fontSize:9,color:C.textFaint,marginTop:3}}>ingredients: {ingredients.length} | recipes: {recipes.length}</div>
            </div>
            <div style={{background:C.surface,borderRadius:8,padding:"10px 14px",border:`1px solid ${C.border}`}}>
              <div style={{fontSize:10,color:C.textFaint,marginBottom:3}}>🌍 OAuth Redirect URI</div>
              <div style={{fontFamily:"monospace",fontSize:10,color:C.text,wordBreak:"break-all"}}>https://clink-menu.vercel.app/callback</div>
              <div style={{fontSize:9,color:C.textFaint,marginTop:3}}>client_id: 555</div>
            </div>
          </div>
        </div>

        {/* ── Endpoint Tests ──────────────────────────────────── */}
        <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 18px",marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:800,color:C.goldDark,marginBottom:12,letterSpacing:1}}>ENDPOINT TESTS</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:12}}>
            {debugEndpoints.map(ep => {
              const raw    = debugRaw[ep.key];
              const loading= debugLoading[ep.key];
              const ok     = raw && raw.status >= 200 && raw.status < 300;
              const expanded = debugExpanded[ep.key];
              return (
                <div key={ep.key} style={{border:`1.5px solid ${raw?(ok?C.positive:C.negative):C.border}`,borderRadius:10,overflow:"hidden"}}>
                  <div style={{padding:"12px 14px",background:raw?(ok?"#F0FFF4":"#FFF0EE"):C.surface}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <div style={{fontSize:13,fontWeight:700,color:C.text}}>{ep.icon} {ep.label}</div>
                      {raw && <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:10,background:ok?C.positive+"20":C.negative+"20",color:ok?C.positive:C.negative}}>{raw.status} {raw.ms}ms</span>}
                    </div>
                    <div style={{fontFamily:"monospace",fontSize:9,color:C.textFaint,marginBottom:8}}>{ep.ep}</div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={() => runDebugTest(ep.ep, ep.key)} disabled={!isConn||loading} style={{flex:1,padding:"6px",borderRadius:6,border:"none",background:isConn?C.gold:"#ccc",color:"white",fontSize:11,fontWeight:700,cursor:isConn?"pointer":"not-allowed",fontFamily:"monospace"}}>
                        {loading ? "⏳ testing..." : "▶ Test"}
                      </button>
                      {raw && <button onClick={() => setDebugExpanded(x=>({...x,[ep.key]:!x[ep.key]}))} style={{padding:"6px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:"white",color:C.textDim,fontSize:11,cursor:"pointer",fontFamily:"monospace"}}>
                        {expanded?"▲ Hide":"▼ JSON"}
                      </button>}
                    </div>
                    {raw && (
                      <div style={{marginTop:8,fontSize:11,color:ok?C.positive:C.negative,fontWeight:600}}>
                        {ok ? `✓ ${raw.data?.data?.length ?? "?"} records returned` : `✗ ${raw.data?.message||raw.data?.error||"Error"}`}
                      </div>
                    )}
                  </div>
                  {expanded && raw && (
                    <div style={{borderTop:`1px solid ${C.border}`,padding:"10px 14px",background:"#0D1117",maxHeight:200,overflowY:"auto"}}>
                      <pre style={{fontFamily:"monospace",fontSize:10,color:"#7EE787",margin:0,whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
                        {JSON.stringify(raw.data, null, 2).slice(0, 3000)}
                      </pre>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* ── Custom Endpoint ─────────────────────────────────── */}
        <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 18px",marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:800,color:C.goldDark,marginBottom:12,letterSpacing:1}}>CUSTOM ENDPOINT</div>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <input value={customEp} onChange={e=>setCustomEp(e.target.value)} placeholder="products.json?limit=5" style={{flex:1,padding:"8px 12px",border:`1.5px solid ${C.border}`,borderRadius:7,fontFamily:"monospace",fontSize:12,background:C.surface,color:C.text}}/>
            <button onClick={runCustom} disabled={!isConn||customLoading} style={{padding:"8px 16px",borderRadius:7,border:"none",background:isConn?C.gold:"#ccc",color:"white",fontSize:12,fontWeight:700,cursor:isConn?"pointer":"not-allowed",fontFamily:"monospace"}}>
              {customLoading?"⏳":"▶ Run"}
            </button>
          </div>
          <div style={{fontSize:10,color:C.textFaint,marginBottom:10,fontFamily:"monospace"}}>
            Full URL: /api/daftra?subdomain={sub||"?"}&apikey=***&endpoint=<strong style={{color:C.gold}}>{customEp}</strong>
          </div>
          {customResult && (
            <div style={{borderRadius:8,overflow:"hidden",border:`1px solid ${customResult.status>=200&&customResult.status<300?C.positive:C.negative}`}}>
              <div style={{padding:"8px 12px",background:customResult.status>=200&&customResult.status<300?"#F0FFF4":"#FFF0EE",display:"flex",gap:12,fontSize:11,fontWeight:700}}>
                <span style={{color:customResult.status>=200&&customResult.status<300?C.positive:C.negative}}>HTTP {customResult.status}</span>
                <span style={{color:C.textFaint}}>{customResult.ms}ms</span>
                <span style={{color:C.textFaint}}>records: {customResult.data?.data?.length??"-"}</span>
              </div>
              <div style={{background:"#0D1117",padding:"10px 14px",maxHeight:220,overflowY:"auto"}}>
                <pre style={{fontFamily:"monospace",fontSize:10,color:"#7EE787",margin:0,whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
                  {JSON.stringify(customResult.data,null,2).slice(0,4000)}
                </pre>
              </div>
            </div>
          )}
        </div>

        {/* ── Activity Log ────────────────────────────────────── */}
        <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 18px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:800,color:C.goldDark,letterSpacing:1}}>ACTIVITY LOG ({debugLogs.length})</div>
            <button onClick={()=>setDebugLogs([])} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:C.surface,color:C.textFaint,fontSize:10,cursor:"pointer",fontFamily:"monospace"}}>Clear</button>
          </div>
          {debugLogs.length === 0 ? (
            <div style={{textAlign:"center",padding:"20px",fontSize:12,color:C.textFaint,fontFamily:"monospace"}}>
              No activity yet — run a test above
            </div>
          ) : (
            <div style={{background:"#0D1117",borderRadius:8,padding:"12px",maxHeight:260,overflowY:"auto",fontFamily:"monospace",fontSize:11}}>
              {debugLogs.map(log => (
                <div key={log.id} style={{marginBottom:6,display:"flex",gap:10,alignItems:"flex-start"}}>
                  <span style={{color:"#6E7681",flexShrink:0}}>{log.ts}</span>
                  <span style={{color:log.type==="success"?"#7EE787":log.type==="error"?"#F85149":"#79C0FF",flexShrink:0}}>
                    {log.type==="success"?"✓":log.type==="error"?"✗":"→"}
                  </span>
                  <span style={{color:"#E6EDF3"}}>{log.msg}</span>
                  {log.detail && <span style={{color:"#6E7681",fontSize:10}}>{log.detail}</span>}
                </div>
              ))}
            </div>
          )}
        </div>

      </div>
    );
  };

  const pageTitle = {
    [PAGES.SETUP]:       ar?"إعدادات دفترة":"Daftra Settings",
    [PAGES.DASHBOARD]:   ar?"لوحة التحكم":"Dashboard",
    [PAGES.INGREDIENTS]: ar?"المكوّنات":"Ingredients",
    [PAGES.RECIPES]:     ar?"الوصفات":"Recipes",
    [PAGES.REPORTS]:     ar?"التقارير":"Reports",
    [PAGES.DEBUG]:       ar?"🔬 لوحة فحص API":"🔬 API Debug Panel",
  }[page];

  return (
    <>
      <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"/>
      <style>{`* { box-sizing: border-box; } @media print { .np { display:none!important; } }`}</style>
      <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Cairo',sans-serif",direction:dir}}>
        {alert && (
          <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:C.white,border:`1.5px solid ${alert.type==="error"?C.negative:alert.type==="warn"?C.warning:C.positive}`,color:alert.type==="error"?C.negative:alert.type==="warn"?C.warning:C.positive,padding:"10px 22px",borderRadius:10,fontSize:13,fontWeight:700,zIndex:999,boxShadow:C.shadow,whiteSpace:"nowrap"}}>
            {alert.msg}
          </div>
        )}
        {!isMobile && <Sidebar/>}
        {isMobile && <BottomNav/>}
        <main style={{[ar?"marginRight":"marginLeft"]:sidebarW,padding:isMobile?"12px 12px 80px":"20px 26px",minHeight:"100vh"}}>
          <HeaderBar/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,paddingBottom:12,borderBottom:`1px solid ${C.borderSoft}`}} className="np">
            <h1 style={{fontSize:isMobile?16:20,fontWeight:800,color:C.text,margin:0}}>{pageTitle}</h1>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {connection.status==="connected" && <span style={{padding:"3px 10px",borderRadius:20,background:C.positive+"18",color:C.positive,border:`1px solid ${C.positive}30`,fontSize:11,fontWeight:700}}>🟢 {ar?"متصل بدفترة":"Connected to Daftra"}</span>}
            {connection.status==="demo" && <span style={{padding:"3px 10px",borderRadius:20,background:C.warning+"18",color:C.warning,border:`1px solid ${C.warning}30`,fontSize:11,fontWeight:700}}>🟡 {ar?"وضع تجربة":"Demo Mode"}</span>}
            {connection.status==="connected" && <button onClick={disconnect} style={{padding:"3px 10px",borderRadius:20,background:"#FFF0EE",color:C.negative,border:`1px solid ${C.negative}30`,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{ar?"قطع الاتصال":"Disconnect"}</button>}
          </div>
          </div>
          {page===PAGES.SETUP        && renderSetup()}
          {page===PAGES.DASHBOARD    && renderDashboard()}
          {page===PAGES.INGREDIENTS  && renderIngredients()}
          {page===PAGES.RECIPES      && renderRecipes()}
          {page===PAGES.REPORTS      && renderReports()}
          {page===PAGES.DEBUG        && renderDebug()}
        </main>
      </div>
    </>
  );
}
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
