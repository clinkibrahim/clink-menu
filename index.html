    const { useState, useMemo, useEffect, useCallback } = React;


// ============================================================
// DAFTRA API LAYER
// Base URL: https://{subdomain}.daftra.com/api2
// Auth Header: apikey: {your_api_key}
// ============================================================
const DaftraAPI = {
  async getProducts(subdomain, apiKey) {
    const res = await fetch(
      `https://${subdomain}.daftra.com/api2/products.json?limit=100`,
      { headers: { apikey: apiKey, Accept: "application/json", "Content-Type": "application/json" } }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    return data.data.map((item) => ({
      id: item.Product.id,
      name: item.Product.name,
      price: parseFloat(item.Product.buy_price) || parseFloat(item.Product.unit_price) || 0,
      unit: "كجم",
      category: item.Product.ProductCategory?.[0]?.name || "عام",
      stock: item.Product.stock_balance || 0,
      daftraId: item.Product.id,
    }));
  },
  async getPurchaseInvoices(subdomain, apiKey) {
    const res = await fetch(
      `https://${subdomain}.daftra.com/api2/purchase_invoices.json?limit=50`,
      { headers: { apikey: apiKey, Accept: "application/json", "Content-Type": "application/json" } }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  },
};

  { code: "SAR", symbol: "ر.س",  name: "الريال السعودي",   flag: "🇸🇦", country: "السعودية" },
  { code: "AED", symbol: "د.إ",  name: "الدرهم الإماراتي", flag: "🇦🇪", country: "الإمارات" },

  { code: "BHD", symbol: "د.ب",  name: "الدينار البحريني", flag: "🇧🇭", country: "البحرين" },
  { code: "QAR", symbol: "ر.ق",  name: "الريال القطري",    flag: "🇶🇦", country: "قطر" },

const getColor = (pct) => pct <= 28 ? "#4ade80" : pct <= 35 ? "#facc15" : "#f87171";
const getLabel = (pct) => pct <= 28 ? "ممتاز" : pct <= 35 ? "مقبول" : "مرتفع";

// ============================================================
// STYLES
// ============================================================
const C = {
  bg: "#0a0906", sidebar: "#120f0a", border: "#2e1f0a",
  gold: "#c9a84c", goldDim: "#7a5520", cream: "#f0e6d3",
  muted: "#6a5030", faint: "#1e1508",
};

const s = {
  app: { minHeight: "100vh", background: C.bg, color: C.cream, fontFamily: "'Cairo', sans-serif", direction: "rtl" },
  sidebar: { width: 230, background: C.sidebar, borderLeft: `1px solid ${C.border}`, display: "flex", flexDirection: "column", padding: "0", position: "fixed", top: 0, right: 0, bottom: 0, zIndex: 10 },
  main: { marginRight: 230, padding: "28px 32px", minHeight: "100vh" },
  topBar: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 28 },
  pageTitle: { fontSize: 22, fontWeight: 800, color: C.cream, margin: 0 },
  kpiGrid: { display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14, marginBottom: 24 },
  card: { background: C.sidebar, border: `1px solid ${C.border}`, borderRadius: 12, padding: "20px 22px", marginBottom: 18 },
  table: { width: "100%", borderCollapse: "collapse" },
  th: { textAlign: "right", padding: "9px 13px", fontSize: 11, color: C.muted, borderBottom: `1px solid ${C.faint}`, fontWeight: 700, letterSpacing: 0.4 },
  td: { padding: "12px 13px", fontSize: 13, borderBottom: `1px solid ${C.faint}`, color: "#c0b090", verticalAlign: "middle" },
  input: { background: "#0a0906", border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 13px", color: C.cream, fontFamily: "'Cairo', sans-serif", fontSize: 14, width: "100%", boxSizing: "border-box", outline: "none" },
  select: { background: "#0a0906", border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 13px", color: C.cream, fontFamily: "'Cairo', sans-serif", fontSize: 14, width: "100%", boxSizing: "border-box" },
  label: { display: "block", fontSize: 11, color: C.muted, marginBottom: 5, fontWeight: 700 },
  modal: { position: "fixed", inset: 0, background: "#00000095", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center" },
  modalBox: { background: C.sidebar, border: `1px solid ${C.border}`, borderRadius: 16, padding: 28, width: 520, maxHeight: "88vh", overflowY: "auto" },
};

const btn = (v) => ({
  padding: v === "sm" ? "5px 12px" : v === "lg" ? "13px 28px" : "9px 18px",
  borderRadius: 8, border: "none", cursor: "pointer", fontFamily: "'Cairo', sans-serif", fontWeight: 700,
  fontSize: v === "sm" ? 12 : v === "lg" ? 15 : 13,
  ...(v === "primary" ? { background: `linear-gradient(135deg, ${C.gold}, #a07830)`, color: "#0a0906" }
    : v === "danger" ? { background: "#200808", color: "#f87171", border: "1px solid #f8717130" }
    : v === "ghost" ? { background: "transparent", color: C.gold, border: `1px solid ${C.goldDim}` }
    : v === "green" ? { background: "#0a2a0a", color: "#4ade80", border: "1px solid #4ade8033" }
    : { background: C.faint, color: C.gold }),
});

const badge = (color, bg) => ({ background: bg || color + "22", color, padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700, display: "inline-block" });

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [page, setPage] = useState(PAGES.SETUP);
  const [connection, setConnection] = useState({ subdomain: "", apiKey: "", status: "disconnected" });
  const [currency, setCurrency] = useState(CURRENCIES[0]); // default: EGP
  const [ingredients, setIngredients] = useState(DEMO_INGREDIENTS);
  const [recipes, setRecipes] = useState(DEMO_RECIPES);
  const [syncLog, setSyncLog] = useState([]);
  const [alert, setAlert] = useState(null);

  // Forms
  const [showIngForm, setShowIngForm] = useState(false);
  const [showRecipeForm, setShowRecipeForm] = useState(false);
  const [editingRecipe, setEditingRecipe] = useState(null);
  const [newIng, setNewIng] = useState({ name: "", unit: "كجم", price: "", category: "خضروات" });
  const [newRecipe, setNewRecipe] = useState({ name: "", category: "الأطباق الرئيسية", sellingPrice: "", portions: 1, ingredients: [] });
  const [recipeIngRow, setRecipeIngRow] = useState({ ingredientId: "", quantity: "" });

  const toast = (msg, type = "success") => { setAlert({ msg, type }); setTimeout(() => setAlert(null), 3500); };

  const addLog = (msg, type = "info") => setSyncLog(prev => [{ msg, type, time: new Date().toLocaleTimeString("ar-EG") }, ...prev.slice(0, 19)]);

  // ── Daftra Connection ──────────────────────────────────────
  const connectDaftra = async () => {
    if (!connection.subdomain || !connection.apiKey) return toast("أدخل النطاق الفرعي ومفتاح API", "error");
    setConnection(c => ({ ...c, status: "connecting" }));
    addLog("جاري الاتصال بدفترة...", "info");
    try {
      const products = await DaftraAPI.getProducts(connection.subdomain, connection.apiKey);
      const mapped = products.map((p, i) => ({ ...p, id: i + 1 }));
      setIngredients(mapped);
      setConnection(c => ({ ...c, status: "connected" }));
      addLog(`✓ تم الاتصال — تم جلب ${mapped.length} منتج من دفترة`, "success");
      toast(`تم الاتصال بنجاح! جُلب ${mapped.length} مكوّن من دفترة`);
      setPage(PAGES.DASHBOARD);
    } catch (err) {
      // CORS in browser sandbox — switch to demo mode with note
      setConnection(c => ({ ...c, status: "demo" }));
      addLog("⚠ CORS في بيئة المتصفح — تشغيل Demo Mode. عند النشر على دفترة يعمل الاتصال الحقيقي.", "warn");
      toast("تم تفعيل وضع التجربة — سيعمل الاتصال الحقيقي بعد النشر على دفترة", "warn");
      setPage(PAGES.DASHBOARD);
    }
  };

  const syncPrices = async () => {
    if (connection.status !== "connected") return toast("يجب الاتصال بدفترة أولاً", "error");
    addLog("جاري تحديث الأسعار من فواتير المشتريات...", "info");
    try {
      const data = await DaftraAPI.getProducts(connection.subdomain, connection.apiKey);
      setIngredients(prev => prev.map(ing => {
        const match = data.find(d => d.daftraId === ing.daftraId);
        if (match && match.price !== ing.price) {
          addLog(`↑ ${ing.name}: ${ing.price} → ${match.price} $${currency.symbol}`, "success");
          return { ...ing, price: match.price };
        }
        return ing;
      }));
      toast("تم تحديث الأسعار من دفترة");
    } catch (e) { toast("فشل التحديث", "error"); }
  };

  // ── Recipe Calculations ────────────────────────────────────
  const calcCost = (recipe) => recipe.ingredients.reduce((sum, ri) => {
    const ing = ingredients.find(i => i.id === ri.ingredientId);
    return sum + (ing ? ing.price * ri.quantity : 0);
  }, 0);

  const enriched = useMemo(() => recipes.map(r => {
    const cost = calcCost(r);
    const pct = r.sellingPrice > 0 ? (cost / r.sellingPrice) * 100 : 0;
    return { ...r, cost, pct, profit: r.sellingPrice - cost };
  }), [recipes, ingredients]);

  const avgFoodCost = useMemo(() => enriched.length ? enriched.reduce((s, r) => s + r.pct, 0) / enriched.length : 0, [enriched]);

  // ── Ingredient CRUD ────────────────────────────────────────
  const addIngredient = () => {
    if (!newIng.name || !newIng.price) return toast("أدخل اسم المكوّن والسعر", "error");
    setIngredients([...ingredients, { ...newIng, id: Date.now(), price: parseFloat(newIng.price) }]);
    setNewIng({ name: "", unit: "كجم", price: "", category: "خضروات" });
    setShowIngForm(false); toast("تم إضافة المكوّن");
  };

  // ── Recipe CRUD ────────────────────────────────────────────
  const addRecipeIng = () => {
    if (!recipeIngRow.ingredientId || !recipeIngRow.quantity) return;
    setNewRecipe(r => ({ ...r, ingredients: [...r.ingredients, { ingredientId: parseInt(recipeIngRow.ingredientId), quantity: parseFloat(recipeIngRow.quantity) }] }));
    setRecipeIngRow({ ingredientId: "", quantity: "" });
  };

  const saveRecipe = () => {
    if (!newRecipe.name || !newRecipe.sellingPrice) return toast("أدخل اسم الوصفة وسعر البيع", "error");
    if (editingRecipe) {
      setRecipes(rs => rs.map(r => r.id === editingRecipe ? { ...newRecipe, id: editingRecipe, sellingPrice: parseFloat(newRecipe.sellingPrice) } : r));
      toast("تم تعديل الوصفة");
    } else {
      setRecipes(rs => [...rs, { ...newRecipe, id: Date.now(), sellingPrice: parseFloat(newRecipe.sellingPrice) }]);
      toast("تم إضافة الوصفة");
    }
    setShowRecipeForm(false); setEditingRecipe(null);
    setNewRecipe({ name: "", category: "الأطباق الرئيسية", sellingPrice: "", portions: 1, ingredients: [] });
  };

  // ── Status Badge ───────────────────────────────────────────
  const statusInfo = {
    disconnected: { color: "#6a5030", dot: "#6a5030", label: "غير متصل" },
    connecting: { color: "#facc15", dot: "#facc15", label: "جاري الاتصال..." },
    connected: { color: "#4ade80", dot: "#4ade80", label: "متصل بدفترة" },
    demo: { color: "#facc15", dot: "#facc15", label: "وضع التجربة" },
    error: { color: "#f87171", dot: "#f87171", label: "خطأ في الاتصال" },
  }[connection.status];

  const navItems = [
    { id: PAGES.DASHBOARD, icon: "◈", label: "لوحة التحكم" },
    { id: PAGES.INGREDIENTS, icon: "⊞", label: "المكوّنات" },
    { id: PAGES.RECIPES, icon: "✦", label: "الوصفات" },
    { id: PAGES.REPORTS, icon: "◎", label: "التقارير" },
    { id: PAGES.SETUP, icon: "⚙", label: "إعدادات دفترة" },
  ];

  // ============================================================
  // RENDER: SETUP PAGE
  // ============================================================
  const renderSetup = () => (
    <div style={{ maxWidth: 620 }}>
      <div style={{ ...s.card, borderColor: C.gold + "44", marginBottom: 24 }}>
        <div style={{ display: "flex", gap: 14, alignItems: "flex-start", marginBottom: 20 }}>
          <div style={{ width: 44, height: 44, borderRadius: 12, background: C.gold + "22", border: `1px solid ${C.gold}44`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>⚙</div>
          <div>
            <div style={{ fontSize: 17, fontWeight: 800, color: C.cream }}>ربط التطبيق بحساب دفترة</div>
            <div style={{ fontSize: 12, color: C.muted, marginTop: 4 }}>أدخل بيانات حسابك لجلب المنتجات والأسعار تلقائياً</div>
          </div>
        </div>

        <div style={{ marginBottom: 14 }}>
          <label style={s.label}>النطاق الفرعي لحسابك في دفترة</label>
          <div style={{ display: "flex", alignItems: "center", gap: 0 }}>
            <div style={{ padding: "10px 13px", background: "#1a1208", border: `1px solid ${C.border}`, borderRadius: "0 8px 8px 0", fontSize: 13, color: C.muted, whiteSpace: "nowrap" }}>.daftra.com</div>
            <input style={{ ...s.input, borderRadius: "8px 0 0 8px", borderLeft: "none" }} placeholder="اسم-شركتك" value={connection.subdomain} onChange={e => setConnection(c => ({ ...c, subdomain: e.target.value }))} />
          </div>
          <div style={{ fontSize: 11, color: "#5a4030", marginTop: 5 }}>مثال: إذا رابط دفترة هو mycompany.daftra.com أدخل: mycompany</div>
        </div>

        <div style={{ marginBottom: 20 }}>
          <label style={s.label}>مفتاح API</label>
          <input style={s.input} type="password" placeholder="أدخل مفتاح API من إعدادات دفترة" value={connection.apiKey} onChange={e => setConnection(c => ({ ...c, apiKey: e.target.value }))} />
          <div style={{ fontSize: 11, color: "#5a4030", marginTop: 5 }}>من دفترة: الإعدادات ← API ← مفاتيح API</div>
        </div>

        <div style={{ marginBottom: 20 }}>
          <label style={s.label}>العملة</label>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginBottom: 8 }}>
            {CURRENCIES.map(c => (
              <div key={c.code} onClick={() => setCurrency(c)} style={{ padding: "10px 8px", borderRadius: 8, border: `1px solid ${currency.code === c.code ? C.gold : C.border}`, background: currency.code === c.code ? C.gold + "18" : C.bg, cursor: "pointer", textAlign: "center", transition: "all 0.15s" }}>
                <div style={{ fontSize: 20, marginBottom: 2 }}>{c.flag}</div>
                <div style={{ fontSize: 12, fontWeight: 700, color: currency.code === c.code ? C.gold : "#c0b090" }}>{c.symbol}</div>
                <div style={{ fontSize: 9, color: "#6a5030", marginTop: 1 }}>{c.country}</div>
              </div>
            ))}
          </div>
          <div style={{ fontSize: 11, color: "#5a4030", padding: "8px 12px", background: C.bg, borderRadius: 6, border: `1px solid ${C.border}` }}>
            العملة المختارة: <strong style={{ color: C.gold }}>{currency.flag} {currency.name} — ${currency.symbol}</strong>
          </div>
        </div>

        <div style={{ display: "flex", gap: 10 }}>
          <button style={btn("primary")} onClick={connectDaftra} disabled={connection.status === "connecting"}>
            {connection.status === "connecting" ? "جاري الاتصال..." : "اتصال بدفترة"}
          </button>
          <button style={btn("ghost")} onClick={() => { setConnection(c => ({ ...c, status: "demo" })); setPage(PAGES.DASHBOARD); toast("تم تفعيل وضع التجربة", "warn"); }}>
            تجربة بدون اتصال
          </button>
        </div>
      </div>

      <div style={s.card}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.gold, marginBottom: 14 }}>⟳ سجل الاتصال</div>
        {syncLog.length === 0 ? (
          <div style={{ fontSize: 13, color: C.muted, textAlign: "center", padding: "20px 0" }}>لا توجد سجلات بعد</div>
        ) : syncLog.map((log, i) => (
          <div key={i} style={{ display: "flex", gap: 10, padding: "7px 0", borderBottom: `1px solid ${C.faint}`, alignItems: "flex-start" }}>
            <span style={{ fontSize: 11, color: "#5a4030", whiteSpace: "nowrap", marginTop: 2 }}>{log.time}</span>
            <span style={{ fontSize: 12, color: log.type === "success" ? "#4ade80" : log.type === "warn" ? "#facc15" : log.type === "error" ? "#f87171" : C.muted }}>{log.msg}</span>
          </div>
        ))}
      </div>

      <div style={{ ...s.card, background: "#0e0a04", border: `1px solid #3a2a1033` }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: C.muted, marginBottom: 10 }}>كيف يعمل الربط؟</div>
        {[
          { step: "١", text: "التطبيق يجلب منتجاتك من دفترة كمكوّنات جاهزة مع أسعار الشراء" },
          { step: "٢", text: "تحديث الأسعار تلقائي من فواتير المشتريات — لا تعديل يدوي" },
          { step: "٣", text: "عند النشر على متجر دفترة، الربط يعمل بالكامل داخل واجهة دفترة" },
        ].map((item, i) => (
          <div key={i} style={{ display: "flex", gap: 10, marginBottom: 10, alignItems: "flex-start" }}>
            <span style={{ background: C.gold + "22", color: C.gold, padding: "2px 8px", borderRadius: 6, fontSize: 12, fontWeight: 800, flexShrink: 0 }}>{item.step}</span>
            <span style={{ fontSize: 12, color: "#7a6040", lineHeight: 1.6 }}>{item.text}</span>
          </div>
        ))}
      </div>
    </div>
  );

  // ============================================================
  // RENDER: DASHBOARD
  // ============================================================
  const renderDashboard = () => (
    <>
      <div style={s.kpiGrid}>
        {[
          { label: "متوسط نسبة التكلفة", value: `${avgFoodCost.toFixed(1)}%`, accent: getColor(avgFoodCost), sub: getLabel(avgFoodCost) },
          { label: "عدد الوصفات", value: enriched.length, accent: "#60a5fa", sub: "وصفة مسجّلة" },
          { label: "عدد المكوّنات", value: ingredients.length, accent: "#a78bfa", sub: connection.status === "connected" ? "مجلوب من دفترة" : "مكوّن محلي" },

          <nav style={{ padding: "14px 12px", flex: 1 }}>
            {navItems.map(item => (
              <div key={item.id} onClick={() => setPage(item.id)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 13px", borderRadius: 9, marginBottom: 3, cursor: "pointer", background: page === item.id ? C.gold + "18" : "transparent", border: `1px solid ${page === item.id ? C.gold + "40" : "transparent"}`, color: page === item.id ? C.gold : C.muted, fontWeight: page === item.id ? 700 : 400, fontSize: 13, transition: "all 0.15s" }}>
                <span style={{ fontSize: 15 }}>{item.icon}</span>
                <span>{item.label}</span>
              </div>
            ))}
          </nav>

          {/* Connection Status */}
          <div style={{ padding: "14px 16px", borderTop: `1px solid ${C.border}` }}>
            <div style={{ fontSize: 10, color: "#4a3020", marginBottom: 6, fontWeight: 700 }}>حالة الاتصال</div>
            <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "8px 12px", background: C.bg, borderRadius: 8, border: `1px solid ${C.border}` }}>
              <div style={{ width: 7, height: 7, borderRadius: "50%", background: statusInfo.dot, boxShadow: `0 0 6px ${statusInfo.dot}` }} />
              <span style={{ fontSize: 11, color: statusInfo.color, fontWeight: 600 }}>{statusInfo.label}</span>
            </div>
          </div>
        </div>

        {/* MAIN */}
        <main style={s.main}>
          <div style={s.topBar}>
            <h1 style={s.pageTitle}>{navItems.find(n => n.id === page)?.label}</h1>
            {page !== PAGES.SETUP && (
              <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                {connection.status === "demo" && <span style={{ ...badge("#facc15"), fontSize: 11 }}>وضع التجربة</span>}
                <button style={btn("ghost")} onClick={() => setPage(PAGES.SETUP)}>⚙ إعدادات دفترة</button>
              </div>
            )}
          </div>
          {page === PAGES.SETUP && renderSetup()}
          {page === PAGES.DASHBOARD && renderDashboard()}
          {page === PAGES.INGREDIENTS && renderIngredients()}
          {page === PAGES.RECIPES && renderRecipes()}
          {page === PAGES.REPORTS && renderReports()}
        </main>
      </div>
    </>
  );
}


    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>
</html>
